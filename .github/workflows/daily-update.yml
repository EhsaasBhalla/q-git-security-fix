name: Daily Update by 23f3002949@ds.study.iitm.ac.in  # Removed mailto link (not YAML-valid)

on:
  schedule:
    - cron: '34 17 * * *'  # 5:32 PM UTC daily ✓ (matches your IST time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        # Add these for push permission:
        persist-credentials: true  # Lets bot push

    - name: Update timestamp file by 23f3002949@ds.study.iitm.ac.in
      run: |
        echo "$(date -u '+%Y-%m-%d %H:%M:%S UTC') - Daily auto-update" > status.txt

    - name: Commit changes
      run: |
        git config user.name "Daily Bot"
        git config user.email "23f3002949@ds.study.iitm.ac.in"
        git add status.txt
        git commit -m "Daily update: $(date -u '+%Y-%m-%d')" || true  # Changed exit 0 → true
        git push
